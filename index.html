<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connection 00 · Ingeniería de Prompts</title>
<meta name="description" content="Connection 00 Doc ROI: aprende jugando a programar la IA generativa.">
<style>
body{margin:0;background:#F4F7FA;color:#0B0F19;font-family:Inter,Arial,sans-serif}
.docroi-loader{min-height:100vh;display:grid;place-items:center;padding:32px;text-align:center}
.docroi-loader-card{max-width:560px;background:#fff;border:1px solid #DDE7F0;border-radius:8px;padding:28px;box-shadow:0 18px 44px rgba(11,15,25,.08)}
.docroi-loader-card img{height:52px;width:auto;margin-bottom:18px}
.docroi-loader-card strong{display:block;font-size:22px;margin-bottom:8px}
.docroi-loader-card p{color:#566274;margin:0}
</style>
</head>
<body>
<div id="docroi-app">
  <div class="docroi-loader">
    <div class="docroi-loader-card">
      <img src="https://docroi.marketing/wp-content/uploads/2024/12/Logo_Doctor_ROI.jpg" alt="DOC ROI">
      <strong>Cargando Connection 00 · DOC ROI</strong>
      <p>Preparando la píldora formativa.</p>
    </div>
  </div>
</div>
<script>
(async function(){
  const target = document.getElementById('docroi-app');
  try {
    const response = await fetch('/connection_00_ingenieria_de_prompts_pildora_wordpress.txt', { cache: 'no-store' });
    if (!response.ok) throw new Error('No se pudo cargar el bloque publicado');
    const html = await response.text();
    target.innerHTML = html;

    Array.from(target.querySelectorAll('script')).forEach(function(oldScript){
      const script = document.createElement('script');
      Array.from(oldScript.attributes).forEach(function(attr){
        script.setAttribute(attr.name, attr.value);
      });
      script.text = oldScript.textContent;
      oldScript.replaceWith(script);
    });
  } catch (error) {
    target.innerHTML = '<div class="docroi-loader"><div class="docroi-loader-card"><strong>No se pudo cargar Connection 00</strong><p>Actualiza la página o revisa el despliegue en Vercel.</p></div></div>';
    console.error(error);
  }
}());
</script>
</body>
</html>
