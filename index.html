<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connection 00 · Ingeniería de Prompts</title>
    <meta name="description" content="Píldora Doc ROI Connection 00: laboratorio de ingeniería de prompts para aprender jugando." />
    <style>
      html,
      body { margin: 0; min-height: 100%; background: #06101f; }
      #docroi-loader { min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: Arial, sans-serif; color: #fff; text-align: center; }
    </style>
  </head>
  <body>
    <div id="docroi-loader">Cargando píldora Doc ROI...</div>
    <script>
      var version = 'product-ficha-upload-ecommerce-20260620';
      var sources = [
        '/connection_00_ingenieria_de_prompts_pildora_wordpress.txt?v=' + version,
        './connection_00_ingenieria_de_prompts_pildora_wordpress.txt?v=' + version
      ];

      var ecommercePrompt = 'ANTES DE RESPONDER, revisa los archivos adjuntos de este chat. Deben estar adjuntos, si existen: 1) logo de la marca, 2) ficha de buyer persona, 3) ficha de producto creada en la pildora de ficha de producto, 4) fotos reales del producto. Si falta alguno, indicalo al inicio y trabaja solo con lo disponible, pero no inventes datos criticos.\n\nActua como estratega ecommerce, copywriter senior y disenador UX. Con la ficha de producto adjunta y la ficha de buyer persona adjunta, crea una FICHA DE PRODUCTO WEB ECOMMERCE similar en ambicion y estructura a una landing de producto como el ejemplo de Juan Valdez.\n\nEl resultado debe incluir obligatoriamente: hero de producto, propuesta de valor, beneficios, atributos, galeria o indicaciones de imagenes, prueba/confianza, objeciones y respuestas, bloque de uso o experiencia, ficha tecnica si aplica, preguntas frecuentes y un cierre de conversion.\n\nIncluye SI O SI una zona de accion comercial con una de estas opciones, segun el caso: COMPRAR AHORA, RESERVAR, o CONTACTAR PARA CERRAR UN ACUERDO. Si no sabes cual conviene, propone las tres jerarquizadas.\n\nEntrega el resultado como vista previa/artefacto HTML en el propio chat si la herramienta lo permite. Si no puede crear vista previa, devuelve un archivo HTML completo en un unico bloque de codigo, listo para copiar, guardar y abrir en navegador. El HTML debe ser responsive, con estilos CSS incluidos, buen contraste, jerarquia visual profesional, y usando el logo, colores, buyer persona, ficha de producto y fotos adjuntas como fuente principal.';

      var workflowCss = '<style>.docroi-product-workflow{background:#fff;padding:72px 24px;border-bottom:1px solid #E1E7EF}.docroi-product-workflow .docroi-product-inner{max-width:1120px;margin:0 auto}.docroi-product-eyebrow{display:inline-block;background:#EAF6FB;color:#003B5C;border:1px solid #D8ECF8;border-radius:999px;padding:9px 14px;font:900 12px Inter,Arial,sans-serif;letter-spacing:.06em;text-transform:uppercase;margin-bottom:18px}.docroi-product-workflow h2{font-family:Inter,Arial,sans-serif;font-size:clamp(34px,5vw,58px);line-height:1.04;margin:0 0 18px;color:#0B0F19;font-weight:900;letter-spacing:0}.docroi-product-workflow p{font-family:Inter,Arial,sans-serif;color:#5B6472;font-size:17px;line-height:1.75;margin:0;max-width:880px}.docroi-upload-box{margin-top:26px;background:#0B0F19;color:#fff;border-radius:8px;padding:24px;border:1px solid #0B0F19}.docroi-upload-box h3{font:900 24px/1.16 Inter,Arial,sans-serif;margin:0 0 14px;color:#fff}.docroi-upload-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.docroi-upload-item{background:#fff;color:#0B0F19;border-radius:8px;padding:16px;border:1px solid #E1E7EF}.docroi-upload-item strong{display:block;color:#003B5C;font:900 16px Inter,Arial,sans-serif;margin-bottom:6px}.docroi-upload-item span{display:block;color:#5B6472;font:600 13px/1.45 Inter,Arial,sans-serif}.docroi-product-flow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:28px}.docroi-product-step{border:1px solid #E1E7EF;border-radius:8px;background:#F8FBFD;padding:18px;min-height:150px}.docroi-product-step strong{display:block;color:#003B5C;font:900 18px Inter,Arial,sans-serif;margin-bottom:8px}.docroi-product-step span{display:block;color:#5B6472;font:600 14px/1.55 Inter,Arial,sans-serif}.docroi-product-step.final{background:#003B5C;border-color:#003B5C}.docroi-product-step.final strong,.docroi-product-step.final span{color:#fff}.docroi-master-prompt{margin-top:18px;border:1px solid #E1E7EF;border-radius:8px;background:#F8FBFD;padding:18px}.docroi-master-prompt h3{font:900 22px/1.2 Inter,Arial,sans-serif;margin:0 0 10px;color:#0B0F19}.docroi-master-prompt pre{white-space:pre-wrap;background:#fff;border:1px solid #E1E7EF;border-radius:8px;padding:16px;color:#0B0F19;font:600 14px/1.55 Arial,sans-serif;margin:0 0 12px;max-height:360px;overflow:auto}.docroi-master-copy{border:0;border-radius:999px;background:#003B5C;color:#fff;padding:13px 18px;font:900 14px Inter,Arial,sans-serif;cursor:pointer}.docroi-product-links{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}.docroi-product-links a{display:block;text-decoration:none;border:1px solid #E1E7EF;border-radius:8px;padding:16px 18px;background:#fff;color:#0B0F19;font:900 15px Inter,Arial,sans-serif}.docroi-product-links small{display:block;margin-top:5px;color:#5B6472;font:600 13px/1.45 Inter,Arial,sans-serif}@media(max-width:900px){.docroi-product-flow,.docroi-product-links,.docroi-upload-grid{grid-template-columns:1fr}.docroi-product-step{min-height:auto}}</style>';

      var promptForHtml = ecommercePrompt.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      var workflowHtml = '<section class="docroi-product-workflow" id="flujo-ficha-producto"><div class="docroi-product-inner"><span class="docroi-product-eyebrow">Flujo obligatorio · ficha de producto ecommerce</span><h2>Primero se sube la ficha de producto. Después se ejecuta el prompt.</h2><p>Este ejercicio no va de pedir una ficha genérica. El alumno debe adjuntar en el mismo chat los materiales del proyecto para que la IA construya una ficha web ecommerce real, con vista previa o HTML, y con llamada a compra, reserva o contacto.</p><div class="docroi-upload-box"><h3>Antes de pegar el prompt, sube estos archivos al chat de IA</h3><div class="docroi-upload-grid"><div class="docroi-upload-item"><strong>Logo de marca</strong><span>Archivo de logo o URL si no lo tienes descargado.</span></div><div class="docroi-upload-item"><strong>Ficha buyer persona</strong><span>La ficha de la píldora 2 o un resumen completo.</span></div><div class="docroi-upload-item"><strong>Ficha de producto</strong><span>La ficha creada en la píldora 4. Es imprescindible para el nuevo resultado.</span></div><div class="docroi-upload-item"><strong>Fotos del producto</strong><span>Imágenes reales usadas o previstas para la ficha web.</span></div></div></div><div class="docroi-product-flow"><div class="docroi-product-step"><strong>1. Subir logo</strong><span>La IA toma identidad visual y coherencia de marca.</span></div><div class="docroi-product-step"><strong>2. Subir buyer persona</strong><span>La IA adapta tono, argumentos y objeciones al público.</span></div><div class="docroi-product-step"><strong>3. Subir ficha de producto</strong><span>La IA usa atributos, beneficios, precio, uso y propuesta de valor.</span></div><div class="docroi-product-step"><strong>4. Subir fotos</strong><span>La IA estructura galería, hero y argumentos visuales.</span></div><div class="docroi-product-step final"><strong>5. Generar web ecommerce</strong><span>Vista previa o HTML con comprar, reservar o contactar.</span></div></div><div class="docroi-master-prompt"><h3>Prompt maestro para crear la ficha web ecommerce</h3><pre id="docroi-ecommerce-prompt">' + promptForHtml + '</pre><button class="docroi-master-copy" data-copy-ecommerce="1">Copiar prompt ecommerce</button></div><div class="docroi-product-links"><a href="https://juan-valdez.vercel.app/" target="_blank" rel="noopener">Ejemplo final Juan Valdez<small>Ficha web ecommerce conseguida con prompt y adjuntos.</small></a><a href="https://buyer-persona-three.vercel.app/" target="_blank" rel="noopener">Crear ficha buyer persona<small>Referencia de la píldora 2.</small></a><a href="https://connection-04-ficha-de-producto.vercel.app/" target="_blank" rel="noopener">Crear ficha de producto<small>Referencia de la píldora 4. Hay que adjuntarla al chat.</small></a></div></div></section>';

      function makeProductFichaVisible(html) {
        var withCss = html.replace('</style>', workflowCss + '</style>');
        withCss = withCss.replace(/Actúa como estratega de marketing y diseñador de fichas comerciales[\s\S]*?estructura visual por secciones\./, ecommercePrompt);
        return withCss.replace('<section class="docroi-section white" id="bloque-formativo">', workflowHtml + '<section class="docroi-section white" id="bloque-formativo">');
      }

      function loadSource(index) {
        return fetch(sources[index], { cache: 'no-store' }).then(function(response) {
          if (!response.ok) throw new Error('missing');
          return response.text();
        }).catch(function(error) {
          if (index + 1 < sources.length) return loadSource(index + 1);
          throw error;
        });
      }

      loadSource(0)
        .then(function(html) {
          document.open();
          document.write(makeProductFichaVisible(html));
          document.close();
          setTimeout(function(){
            var button = document.querySelector('[data-copy-ecommerce]');
            if (button) {
              button.addEventListener('click', function(){
                var text = document.getElementById('docroi-ecommerce-prompt').innerText;
                if (navigator.clipboard) navigator.clipboard.writeText(text);
                button.innerText = 'Prompt copiado';
                setTimeout(function(){ button.innerText = 'Copiar prompt ecommerce'; }, 1400);
              });
            }
          }, 0);
        })
        .catch(function() {
          document.getElementById('docroi-loader').textContent = 'No se pudo cargar la píldora. Revisa el despliegue de Vercel.';
        });
    </script>
  </body>
</html>
