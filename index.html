<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connection 00 · Ingeniería de Prompts</title>
    <meta name="description" content="Píldora Doc ROI Connection 00: laboratorio de ingeniería de prompts para aprender jugando." />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #06101f;
      }
      #docroi-loader {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        color: #fff;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="docroi-loader">Cargando píldora Doc ROI...</div>
    <script>
      var sources = [
        '/connection_00_ingenieria_de_prompts_pildora_wordpress.txt',
        './connection_00_ingenieria_de_prompts_pildora_wordpress.txt'
      ];

      function loadSource(index) {
        return fetch(sources[index], { cache: 'no-store' }).then(function(response) {
          if (!response.ok) throw new Error('missing');
          return response.text();
        }).catch(function(error) {
          if (index + 1 < sources.length) return loadSource(index + 1);
          throw error;
        });
      }

      loadSource(0)
        .then(function(html) {
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function() {
          document.getElementById('docroi-loader').textContent = 'No se pudo cargar la píldora. Revisa el despliegue de Vercel.';
        });
    </script>
  </body>
</html>
