        var level='bronze',i=0,score=0,selected='',notes=[],earned=false;function updateCert(pass){var cert=$('#certificate'),rank=$('#certRank'),copy=$('#certCopy'),name=$('#certPerson');if(!cert||!rank)return;cert.classList.remove('bronze','silver','gold','practice');cert.classList.add(pass?level:'practice');rank.textContent=pass?level.toUpperCase():'EN PRÁCTICA';copy.textContent=pass?'Ha completado Memory Jogger y obtiene medalla '+level.toUpperCase()+'.':'Completa Memory Jogger para obtener una medalla.';if(name)name.textContent=$('#certName')&&$('#certName').value?$('#certName').value:(pass?'Persona certificada':'Persona en práctica')}function resetQuiz(){if(!$('#quizBar'))return;i=0;score=0;selected='';notes=[];earned=false;$('#quizLevel').textContent=level.toUpperCase();$('#quizQuestion').textContent='Pulsa “Empezar juego” para jugar.';$('#quizText').textContent='La partida te irá enseñando qué variable o fórmula conviene usar en cada situación.';$('#quizOptions').innerHTML='';$('#quizBar').style.width='0%';$('#nextQuestion').disabled=true;$('#quizFeedback').innerHTML='<strong>Cómo se juega:</strong> elige una respuesta. Te diremos si es correcta y por qué.';$('#kitGrid').innerHTML=quiz[level].rewards.map(function(r){return '<div class="learn-item">'+clean(r)+'</div>'}).join('');updateCert(false)}function showQuestion(){var q=quiz[level].qs[i];selected='';$('#nextQuestion').disabled=true;$('#quizBar').style.width=Math.round((i/quiz[level].need)*100)+'%';if(!q){finishQuiz();return}$('#quizQuestion').textContent='Pregunta '+(i+1)+' de '+quiz[level].need;$('#quizText').textContent=q[0];$('#quizOptions').innerHTML=q[2].map(function(a){return '<button class="answer-choice" data-a="'+clean(a)+'">'+clean(a)+'</button>'}).join('');$('#quizFeedback').innerHTML='<strong>Elige una opción.</strong> Después podrás pasar a la siguiente pregunta.';$all('.answer-choice').forEach(function(b){b.onclick=function(){if(selected)return;selected=b.dataset.a;var good=selected===q[1]
